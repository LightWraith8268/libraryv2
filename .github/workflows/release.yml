name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # Skip version bump commits to avoid infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)

          CURRENT_MAJOR=$(grep '^app.versionMajor=' gradle.properties | cut -d= -f2)
          CURRENT_MINOR=$(grep '^app.versionMinor=' gradle.properties | cut -d= -f2)
          CURRENT_PATCH=$(grep '^app.versionPatch=' gradle.properties | cut -d= -f2)
          CURRENT_BUILD=$(grep '^app.versionBuild=' gradle.properties | cut -d= -f2)

          NEW_BUILD=$((CURRENT_BUILD + 1))

          # Determine bump type from conventional commit
          if echo "$COMMIT_MSG" | grep -qiE 'BREAKING CHANGE' || echo "$FIRST_LINE" | grep -qE '^[a-z]+!:'; then
            NEW_MAJOR=$((CURRENT_MAJOR + 1)); NEW_MINOR=0; NEW_PATCH=0
          elif echo "$FIRST_LINE" | grep -qE '^feat(\(.+\))?:'; then
            NEW_MAJOR=$CURRENT_MAJOR; NEW_MINOR=$((CURRENT_MINOR + 1)); NEW_PATCH=0
          else
            NEW_MAJOR=$CURRENT_MAJOR; NEW_MINOR=$CURRENT_MINOR; NEW_PATCH=$((CURRENT_PATCH + 1))
          fi

          VERSION="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "Version bump: $CURRENT_MAJOR.$CURRENT_MINOR.$CURRENT_PATCH -> $NEW_MAJOR.$NEW_MINOR.$NEW_PATCH (build $NEW_BUILD)"

          # Update gradle.properties
          sed -i "s/^app.versionMajor=.*/app.versionMajor=$NEW_MAJOR/" gradle.properties
          sed -i "s/^app.versionMinor=.*/app.versionMinor=$NEW_MINOR/" gradle.properties
          sed -i "s/^app.versionPatch=.*/app.versionPatch=$NEW_PATCH/" gradle.properties
          sed -i "s/^app.versionBuild=.*/app.versionBuild=$NEW_BUILD/" gradle.properties

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Update changelog version
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          TODAY=$(date +%Y-%m-%d)
          # Update the first ## [x.x.x] header to the new version and today's date
          sed -i "0,/^## \[.*\]/s/^## \[.*\]/## [${VERSION_NAME}] - ${TODAY}/" CHANGELOG.md

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.version_code }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties CHANGELOG.md
          git commit -m "chore: bump version to ${VERSION} (build ${BUILD}) [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "Error: GOOGLE_SERVICES_JSON secret is required for releases"
            exit 1
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
          else
            echo "Warning: No keystore provided, skipping release build"
          fi

      - name: Build release APK and AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Rename build outputs with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/LibraryIQ-${VERSION}-debug.apk"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/LibraryIQ-${VERSION}-release.apk"
          fi
          if [ -f app/build/outputs/bundle/release/app-release.aab ]; then
            cp app/build/outputs/bundle/release/app-release.aab "app/build/outputs/bundle/release/LibraryIQ-${VERSION}-release.aab"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibraryIQ-${{ steps.version.outputs.version }}
          path: |
            app/build/outputs/apk/debug/LibraryIQ-*.apk
            app/build/outputs/apk/release/LibraryIQ-*.apk
            app/build/outputs/bundle/release/LibraryIQ-*.aab
          retention-days: 30

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the latest changelog section (first ## entry)
          NOTES=$(awk '/^## \[/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.version_name }}"
          fi
          # Strip Claude session URLs, PR links, usernames, and co-author trailers
          NOTES=$(echo "$NOTES" | sed \
            -e 's|https://claude\.ai/[^ ]*||g' \
            -e 's| by @[a-zA-Z0-9_-]* in https://github\.com/[^ ]*||g' \
            -e 's|\*\* *Full Changelog.*||g' \
            -e '/^Co-authored-by:/d' \
            -e 's/ *$//')
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.version_code }}"

          # Collect all release files: debug APK, release APK, release AAB
          FILES="app/build/outputs/apk/debug/LibraryIQ-${VERSION}-debug.apk"
          if [ -f "app/build/outputs/apk/release/LibraryIQ-${VERSION}-release.apk" ]; then
            FILES="$FILES app/build/outputs/apk/release/LibraryIQ-${VERSION}-release.apk"
          fi
          if [ -f "app/build/outputs/bundle/release/LibraryIQ-${VERSION}-release.aab" ]; then
            FILES="$FILES app/build/outputs/bundle/release/LibraryIQ-${VERSION}-release.aab"
          fi

          gh release create "$VERSION" \
            --title "LibraryIQ $VERSION (build $BUILD)" \
            --notes-file /tmp/release_notes.md \
            $FILES
