name: Auto Version Bump

on:
  push:
    branches: [ main ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'app/proguard-rules.pro'

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    # Don't run on commits made by this workflow (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip-version-bump]')"

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from commit message
        id: bump-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)

          # Check for breaking change (major bump)
          if echo "$COMMIT_MSG" | grep -qiE 'BREAKING CHANGE'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$FIRST_LINE" | grep -qE '^[a-z]+!:'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          # Check for feature (minor bump)
          elif echo "$FIRST_LINE" | grep -qE '^feat(\(.+\))?:'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          # Everything else: fix, chore, docs, refactor, etc. (patch bump)
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

          echo "Commit: $FIRST_LINE"
          echo "Bump type: $(cat $GITHUB_OUTPUT | grep bump | cut -d= -f2)"

      - name: Bump version
        run: |
          FILE="app/build.gradle.kts"
          BUMP_TYPE="${{ steps.bump-type.outputs.bump }}"

          # Read current values
          CURRENT_MAJOR=$(grep 'val versionMajor' "$FILE" | grep -oP '\d+')
          CURRENT_MINOR=$(grep 'val versionMinor' "$FILE" | grep -oP '\d+')
          CURRENT_PATCH=$(grep 'val versionPatch' "$FILE" | grep -oP '\d+')
          CURRENT_BUILD=$(grep 'val versionBuild' "$FILE" | grep -oP '\d+')

          # Always bump build
          NEW_BUILD=$((CURRENT_BUILD + 1))

          # Bump based on type
          case "$BUMP_TYPE" in
            major)
              NEW_MAJOR=$((CURRENT_MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            minor)
              NEW_MAJOR=$CURRENT_MAJOR
              NEW_MINOR=$((CURRENT_MINOR + 1))
              NEW_PATCH=0
              ;;
            patch)
              NEW_MAJOR=$CURRENT_MAJOR
              NEW_MINOR=$CURRENT_MINOR
              NEW_PATCH=$((CURRENT_PATCH + 1))
              ;;
          esac

          echo "Version: $CURRENT_MAJOR.$CURRENT_MINOR.$CURRENT_PATCH -> $NEW_MAJOR.$NEW_MINOR.$NEW_PATCH (build $CURRENT_BUILD -> $NEW_BUILD)"
          echo "Bump type: $BUMP_TYPE"

          # Update file
          sed -i "s/val versionMajor = $CURRENT_MAJOR/val versionMajor = $NEW_MAJOR/" "$FILE"
          sed -i "s/val versionMinor = $CURRENT_MINOR/val versionMinor = $NEW_MINOR/" "$FILE"
          sed -i "s/val versionPatch = $CURRENT_PATCH/val versionPatch = $NEW_PATCH/" "$FILE"
          sed -i "s/val versionBuild = $CURRENT_BUILD/val versionBuild = $NEW_BUILD/" "$FILE"

          # Verify
          echo "Updated values:"
          grep -E 'val version(Major|Minor|Patch|Build)' "$FILE"

      - name: Commit version bump
        run: |
          MAJOR=$(grep 'val versionMajor' app/build.gradle.kts | grep -oP '\d+')
          MINOR=$(grep 'val versionMinor' app/build.gradle.kts | grep -oP '\d+')
          PATCH=$(grep 'val versionPatch' app/build.gradle.kts | grep -oP '\d+')
          BUILD=$(grep 'val versionBuild' app/build.gradle.kts | grep -oP '\d+')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to v${MAJOR}.${MINOR}.${PATCH} (build ${BUILD}) [skip-version-bump]"
          git push
