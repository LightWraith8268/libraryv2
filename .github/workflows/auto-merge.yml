name: Auto PR & Merge

on:
  push:
    branches: [ 'claude/**' ]

jobs:
  auto-merge:
    name: Create PR & Merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, merging..."
            PR_NUMBER=$EXISTING_PR
          else
            echo "Creating PR from $BRANCH to main..."
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Auto-merge from $BRANCH")
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "Created PR #$PR_NUMBER"
          fi

          # Merge with merge commit (not squash)
          gh pr merge "$PR_NUMBER" --merge --auto
