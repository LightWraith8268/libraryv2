name: Auto PR & Merge

on:
  push:
    branches: [ 'claude/**' ]

jobs:
  auto-merge:
    name: Create PR & Merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR, merge, and trigger release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, merging..."
            PR_NUMBER="$EXISTING_PR"
          else
            echo "Creating PR from $BRANCH to main..."
            PR_NUMBER=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Auto-merge from $BRANCH" 2>&1 | tail -1 | rev | cut -d'/' -f1 | rev)
            echo "Created PR #$PR_NUMBER"
          fi

          # Wait for PR to be ready
          sleep 5

          # Merge with merge commit (not squash, not rebase)
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --merge --delete-branch=false

          echo "Merge complete. Triggering release workflow..."

          # GITHUB_TOKEN pushes/merges don't trigger on:push workflows,
          # but workflow_dispatch is an exception — trigger release explicitly
          gh workflow run release.yml
          echo "Release workflow triggered."
