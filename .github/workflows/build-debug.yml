name: Build LibraryIQ

on:
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "Using placeholder google-services.json from repo"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        env:
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LibraryIQ-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  build-release:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "Error: GOOGLE_SERVICES_JSON secret is required for release builds"
            exit 1
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: LibraryIQ-release
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: LibraryIQ-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
